version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: tripvault-postgres
    restart: unless-stopped

    ports:
      - "5433:5432"

    environment:
      POSTGRES_DB: tripvault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rohit123

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: tripvault-backend

    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./TripVault-Frontend
      dockerfile: Dockerfile

    container_name: tripvault-frontend

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "80:80"

volumes:
  postgres-data: